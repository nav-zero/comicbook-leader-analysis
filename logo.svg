<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 48" width="120" height="48" role="img" aria-label="Comparative Analysis - Home">
  <defs>
    <linearGradient id="burst" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8152A"/>
      <stop offset="100%" style="stop-color:#b71c1c"/>
    </linearGradient>
    <filter id="outline" x="-20%" y="-20%" width="140%" height="140%">
      <feMorphology in="SourceAlpha" result="dilated" operator="dilate" radius="1.2"/>
      <feFlood flood-color="#13100D"/>
      <feComposite in2="dilated" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Comic burst / panel shape -->
  <path d="M8 4 L44 4 L48 8 L48 40 L44 44 L8 44 L4 40 Z" fill="url(#burst)" stroke="#13100D" stroke-width="2" filter="url(#outline)"/>
  <!-- Letters CA -->
  <text x="26" y="32" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#FFD700" stroke="#13100D" stroke-width="1.5" paint-order="stroke fill">CA</text>
</svg>
