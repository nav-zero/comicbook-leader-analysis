<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparative Analysis — Longitudinal Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --marvel-red: #e23636;
      --marvel-dark-red: #b71c1c;
      --marvel-blue: #518cca;
      --marvel-gold: #f78f3f;
      --marvel-yellow: #ffcb05;
      --panel-bg: #1a1a2e;
      --ink-black: #0d0d14;
      --white: #f5f5f5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: var(--panel-bg);
      font-family: 'Oswald', sans-serif;
      color: var(--white);
      overflow-x: hidden;
      position: relative;
    }

    /* Comic panel grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    /* Halftone dots overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at center, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 8px 8px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Main title panel - comic style */
    .title-panel {
      background: linear-gradient(145deg, var(--marvel-dark-red) 0%, var(--marvel-red) 50%, var(--marvel-dark-red) 100%);
      border: 4px solid var(--ink-black);
      border-radius: 4px;
      padding: 2rem 2.5rem;
      margin-bottom: 3rem;
      position: relative;
      box-shadow: 
        8px 8px 0 var(--ink-black),
        inset 0 1px 0 rgba(255,255,255,0.2);
      text-align: center;
    }

    .title-panel::before {
      content: '';
      position: absolute;
      top: -8px;
      left: -8px;
      right: -8px;
      bottom: -8px;
      border: 2px solid var(--marvel-gold);
      border-radius: 6px;
      pointer-events: none;
    }

    .title {
      font-family: 'Bangers', cursive;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      line-height: 1.35;
      color: var(--marvel-yellow);
      text-shadow: 
        3px 3px 0 var(--ink-black),
        -1px -1px 0 var(--ink-black),
        0 0 20px rgba(0,0,0,0.5);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .subtitle {
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      margin-top: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Buttons - comic book style */
    .books {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
      align-items: stretch;
    }

    .book-btn {
      font-family: 'Bangers', cursive;
      font-size: 2rem;
      letter-spacing: 0.05em;
      padding: 1.25rem 2.5rem;
      min-width: 160px;
      border: 4px solid var(--ink-black);
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      position: relative;
      text-decoration: none;
      color: var(--ink-black);
      background: linear-gradient(180deg, var(--marvel-yellow) 0%, var(--marvel-gold) 50%, #e67e22 100%);
      box-shadow: 6px 6px 0 var(--ink-black);
      text-shadow: 1px 1px 0 rgba(255,255,255,0.4);
    }

    .book-btn:hover {
      transform: translate(-2px, -4px);
      box-shadow: 10px 10px 0 var(--ink-black);
    }

    .book-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 4px 4px 0 var(--ink-black);
    }

    .book-btn.book-1 { background: linear-gradient(180deg, #e23636 0%, #b71c1c 100%); color: var(--white); text-shadow: 2px 2px 0 var(--ink-black); }
    .book-btn.book-2 { background: linear-gradient(180deg, #518cca 0%, #2c5282 100%); color: var(--white); text-shadow: 2px 2px 0 var(--ink-black); }
    .book-btn.book-3 { background: linear-gradient(180deg, var(--marvel-yellow) 0%, var(--marvel-gold) 100%); color: var(--ink-black); }

    /* "Choose your issue" label */
    .choose-label {
      font-family: 'Bangers', cursive;
      font-size: 1.6rem;
      color: var(--marvel-gold);
      margin-bottom: 1.5rem;
      text-shadow: 2px 2px 0 var(--ink-black);
      letter-spacing: 0.08em;
    }

    /* Decorative corner brackets */
    .title-panel .corner {
      position: absolute;
      width: 24px;
      height: 24px;
      border: 3px solid var(--marvel-yellow);
      opacity: 0.8;
    }
    .title-panel .corner-tl { top: 8px; left: 8px; border-right: none; border-bottom: none; }
    .title-panel .corner-tr { top: 8px; right: 8px; border-left: none; border-bottom: none; }
    .title-panel .corner-bl { bottom: 8px; left: 8px; border-right: none; border-top: none; }
    .title-panel .corner-br { bottom: 8px; right: 8px; border-left: none; border-top: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-panel">
      <span class="corner corner-tl"></span>
      <span class="corner corner-tr"></span>
      <span class="corner corner-bl"></span>
      <span class="corner corner-br"></span>
      <h1 class="title">Comparative Analysis of Political Consolidation, Institutional Erosion, and Executive Kinetic Action</h1>
      <p class="subtitle">A Longitudinal Study of Hitler, Trump, and Netanyahu</p>
    </div>

    <p class="choose-label">Choose Your Issue</p>

    <div class="books">
      <button class="book-btn book-1" type="button">Book 1</button>
      <button class="book-btn book-2" type="button">Book 2</button>
      <button class="book-btn book-3" type="button">Book 3</button>
    </div>
  </div>

  <script>
    document.querySelectorAll('.book-btn').forEach((btn, i) => {
      btn.addEventListener('click', () => {
        const bookNum = i + 1;
        if (window.location.pathname.endsWith('.html') || window.location.pathname.includes('index')) {
          window.location.href = `book-${bookNum}.html`;
        } else {
          window.location.href = `book-${bookNum}.html`;
        }
      });
    });
  </script>
</body>
</html>
